<body>

  </header>

    <main class="tool-main">
    <div class="tool-header">
      <h1>Batch Hash</h1>
      <p>Hash multiple strings at once — one per line. <strong>Pro feature.</strong></p>
    </div>
    <div class="tool-body">
      <div>
        <label class="field-label" for="batchInput">Input (one value per line)</label>
        <textarea id="batchInput" class="big-input" rows="8" placeholder="apple&#10;banana&#10;cherry&#10;…" spellcheck="false"></textarea>
      </div>
      <div class="algo-selector">
        <label class="field-label">Algorithm</label>
        <div class="algo-grid">
          <button class="algo-btn active" data-algo="SHA256">SHA-256</button>
          <button class="algo-btn" data-algo="SHA512">SHA-512</button>
          <button class="algo-btn" data-algo="MD5">MD5</button>
          <button class="algo-btn" data-algo="SHA1">SHA-1</button>
          <button class="algo-btn" data-algo="CRC32">CRC32</button>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="batchBtn">Hash All</button>
        <button class="btn-ghost" id="copyCSVBtn">Copy as CSV</button>
        <button class="btn-ghost" id="clearBatchBtn">Clear</button>
      </div>
      <div class="output-panel" id="batchResults" hidden>
        <label class="field-label">Results</label>
        <table class="result-table" id="batchTable">
          <thead>
            <tr><th>#</th><th>Input</th><th>Hash</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
