<body>
  <header class="site-header">
    <a class="logo" href="https://mdothree.com">m<span class="dot">.</span>3</a>
    <nav class="tool-nav">
      <a href="/">Hash</a>

    <main class="tool-main">
    <div class="tool-header">
      <h1>UUID Generator</h1>
      <p>Generate universally unique identifiers — v1 (time-based), v4 (random), or v5 (name-based).</p>
    </div>
    <div class="tool-body">
      <div class="algo-selector">
        <label class="field-label">Version</label>
        <div class="algo-grid">
          <button class="algo-btn active" data-ver="v4">v4 — Random</button>
          <button class="algo-btn" data-ver="v1">v1 — Time</button>
          <button class="algo-btn" data-ver="v5">v5 — Name</button>
        </div>
      </div>
      <div id="v5Options" class="hidden">
        <div>
          <label class="field-label" for="v5Name">Name</label>
          <input type="text" id="v5Name" class="input-field" placeholder="e.g. https://example.com" />
        </div>
        <div>
          <label class="field-label" for="v5Namespace">Namespace</label>
          <select id="v5Namespace" class="input-field">
            <option value="6ba7b810-9dad-11d1-80b4-00c04fd430c8">DNS</option>
            <option value="6ba7b811-9dad-11d1-80b4-00c04fd430c8">URL</option>
          </select>
        </div>
      </div>
      <div class="count-row">
        <label class="field-label">Count</label>
        <input type="number" id="uuidCount" class="input-field input-field--narrow" value="5" min="1" max="100" / inputmode="numeric">
      </div>
      <div class="action-row">
        <button class="btn-primary" id="generateUUIDs">Generate</button>
        <button class="btn-ghost" id="copyAllUUIDs">Copy All</button>
        <button class="btn-ghost" id="clearUUIDs">Clear</button>
      </div>
      <div class="output-panel">
        <label class="field-label">UUIDs</label>
        <div id="uuidGrid" class="uuid-grid"></div>
      </div>
    </div>
  </main>

  <script src="js/pages/uuid.js" type="module"></script>
