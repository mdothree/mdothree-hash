<body>
  <header class="site-header">
    <a class="logo" href="https://mdothree.com">m<span class="dot">.</span>3</a>
    <nav class="tool-nav">
      <a href="#hash" class="active">Hash</a>

    </nav>
  </header>

  <main class="tool-main">
    <div class="tool-header">
      <h1>Hash Generator</h1>
      <p>Generate cryptographic hashes from text. All processing is done locally in your browser — nothing is sent to any server.</p>
    </div>

    <div class="tool-body">
      <div class="input-panel">
        <label class="field-label" for="inputText">Input Text</label>
        <textarea id="inputText" class="big-input" placeholder="Enter text to hash…" rows="6" spellcheck="false"></textarea>
        <div class="input-actions">
          <button class="btn-ghost" id="clearBtn">Clear</button>
          <button class="btn-ghost" id="sampleBtn">Sample</button>
          <span class="char-count" id="charCount">0 characters</span>
        </div>
      </div>

      <div class="algo-selector">
        <label class="field-label">Algorithm</label>
        <div class="algo-grid">
          <button class="algo-btn active" data-algo="SHA256">SHA-256</button>
          <button class="algo-btn" data-algo="SHA512">SHA-512</button>
          <button class="algo-btn" data-algo="SHA1">SHA-1</button>
          <button class="algo-btn" data-algo="SHA384">SHA-384</button>
          <button class="algo-btn" data-algo="SHA3">SHA-3</button>
          <button class="algo-btn" data-algo="MD5">MD5</button>
          <button class="algo-btn" data-algo="CRC32">CRC32</button>
          <button class="algo-btn" data-algo="BCRYPT">bcrypt</button>
        </div>
      </div>

      <!-- bcrypt options -->
      <div class="bcrypt-options hidden" id="bcryptOptions">
        <label class="field-label">Salt Rounds</label>
        <input type="range" id="saltRounds" min="4" max="14" value="10" class="slider" />
        <span id="saltRoundsVal">10</span>
      </div>

      <div class="output-panel" id="outputPanel">
        <div class="output-row" id="outputRow">
          <label class="field-label">Hash Output</label>
          <div class="hash-output" id="hashOutput">—</div>
          <div class="output-actions">
            <button class="btn-ghost" id="copyBtn">Copy</button>
            <span class="output-meta" id="outputMeta"></span>
          </div>
        </div>
        <!-- Show all hashes -->
        <div id="allHashes" class="all-hashes hidden"></div>
      </div>

      <div class="action-row">
        <button class="btn-primary" id="generateBtn">Generate Hash</button>
        <button class="btn-ghost" id="showAllBtn">Show All Algorithms</button>
      </div>
    </div>
  </main>

  <script src="js/app.js" type="module"></script>
