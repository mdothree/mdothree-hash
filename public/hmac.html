<body>
  <header class="site-header">
    <a class="logo" href="https://mdothree.com">m<span class="dot">.</span>3</a>

    <main class="tool-main">
    <div class="tool-header">
      <h1>HMAC Generator</h1>
      <p>Generate hash-based message authentication codes using a secret key. <strong>Pro feature.</strong></p>
    </div>
    <div class="tool-body">
      <div>
        <label class="field-label" for="hmacMessage">Message</label>
        <textarea id="hmacMessage" class="big-input" rows="4" placeholder="Enter message…" spellcheck="false"></textarea>
      </div>
      <div>
        <label class="field-label" for="hmacSecret">Secret Key</label>
        <input type="password" id="hmacSecret" class="input-field" placeholder="Enter secret key…" autocomplete="off" />
      </div>
      <div class="algo-selector">
        <label class="field-label">Algorithm</label>
        <div class="algo-grid">
          <button class="algo-btn active" data-algo="SHA-256">SHA-256</button>
          <button class="algo-btn" data-algo="SHA-512">SHA-512</button>
          <button class="algo-btn" data-algo="SHA-384">SHA-384</button>
          <button class="algo-btn" data-algo="SHA-1">SHA-1</button>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="genHMAC">Generate HMAC</button>
      </div>
      <div class="output-panel">
        <label class="field-label">Output</label>
        <div class="hmac-outputs">
          <div>
            <div class="hash-row-label">Hex</div>
            <div class="hash-output" id="hmacHex">—</div>
          </div>
          <div>
            <div class="hash-row-label">Base64</div>
            <div class="hash-output" id="hmacB64">—</div>
          </div>
        </div>
        <div class="output-actions">
          <button class="btn-ghost" id="copyHMACHex">Copy Hex</button>
          <button class="btn-ghost" id="copyHMACB64">Copy Base64</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/pages/hmac.js" type="module"></script>
