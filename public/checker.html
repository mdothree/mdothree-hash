<body>
  <header class="site-header">

    <main class="tool-main">
    <div class="tool-header">
      <h1>Hash Checker</h1>
      <p>Verify text or file integrity by comparing against a known hash value. <strong>Pro feature.</strong></p>
    </div>
    <div class="tool-body">
      <div class="algo-selector">
        <label class="field-label">Mode</label>
        <div class="algo-grid">
          <button class="algo-btn active" id="modeText">Text</button>
          <button class="algo-btn" id="modeFile">File</button>
        </div>
      </div>
      <div id="textPanel">
        <label class="field-label" for="checkInput">Input Text</label>
        <textarea id="checkInput" class="big-input" rows="4" placeholder="Enter text to verify…" spellcheck="false"></textarea>
      </div>
      <div id="filePanel" class="hidden">
        <label class="field-label">File</label>
        <div id="dropzone" class="dropzone">
          <div class="dropzone__icon">📁</div>
          <div class="dropzone__label">Drop a file here or <span class="dropzone__browse" id="browseBtn">browse</span></div>
          <div id="fileInfo" class="dropzone__info"></div>
          <input type="file" id="fileInput" class="hidden" />
        </div>
      </div>
      <div>
        <label class="field-label" for="knownHash">Known Hash</label>
        <input type="text" id="knownHash" class="input-field input-field--mono" placeholder="Paste the hash you want to verify against…" spellcheck="false" />
        <div class="field-hint" id="detectedAlgo"></div>
      </div>
      <div class="algo-selector">
        <label class="field-label">Algorithm</label>
        <div class="algo-grid">
          <button class="algo-btn active" data-algo="SHA256">SHA-256</button>
          <button class="algo-btn" data-algo="SHA512">SHA-512</button>
          <button class="algo-btn" data-algo="SHA384">SHA-384</button>
          <button class="algo-btn" data-algo="SHA1">SHA-1</button>
          <button class="algo-btn" data-algo="MD5">MD5</button>
          <button class="algo-btn" data-algo="CRC32">CRC32</button>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="verifyBtn">Verify Hash</button>
      </div>
      <div class="output-panel" id="resultPanel" hidden>
        <div id="verifyResult" class="verify-result"></div>
        <label class="field-label">Computed Hash</label>
        <div class="hash-output" id="computedHash"></div>
      </div>
    </div>
  </main>
